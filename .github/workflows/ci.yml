name: api-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pawtner_db
          POSTGRES_USER: pawtner
          POSTGRES_PASSWORD: dev-secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pawtner -d pawtner_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgres://pawtner:dev-secret@localhost:5432/pawtner_db
      TEST_DATABASE_URL: postgres://pawtner:dev-secret@localhost:5432/pawtner_db
      KEYCLOAK_ISSUER: http://localhost:18080/realms/pawtner
      KEYCLOAK_AUDIENCE: pawtner-mobile

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets
